name: Helm

on:
  push:
    branches:
      - main
    paths:
      - "deploy/charts/**"
  pull_request:
    paths:
      - "deploy/charts/**"

env:
  HELM_VERSION: "v3.19.2"

jobs:
  lint-cluster:
    name: Cluster
    runs-on: ubuntu-latest
    env:
      CT_CONFIG: hack/config/chart-testing/mariadb-cluster.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: List changed
        id: list-changed
        run: |
          changed=$(ct list-changed --config $CT_CONFIG)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config $CT_CONFIG

  lint-crds:
    name: CRDs
    runs-on: ubuntu-latest
    env:
      CT_CONFIG: hack/config/chart-testing/mariadb-operator-crds.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: List changed
        id: list-changed
        run: |
          changed=$(ct list-changed --config $CT_CONFIG)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config $CT_CONFIG

      - name: Cluster
        if: steps.list-changed.outputs.changed == 'true'
        run: make cluster

      - name: Test install
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config $CT_CONFIG

  lint-operator:
    name: Operator
    runs-on: ubuntu-latest
    env:
      CT_CONFIG: hack/config/chart-testing/mariadb-operator.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: List changed
        id: list-changed
        run: |
          changed=$(ct list-changed --config $CT_CONFIG)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config $CT_CONFIG

      - name: Cluster
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          make cluster
          make docker-build
          make docker-load

      - name: Test install
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config $CT_CONFIG --helm-extra-set-args "--set=crds.enabled=true"

  release:
    runs-on: ubuntu-latest
    needs:
      - lint-cluster
      - lint-crds
      - lint-operator
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: "${{ secrets.GHA_TOKEN }}"

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run chart-releaser
        id: chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GHA_TOKEN }}"
          CR_RELEASE_NAME_TEMPLATE: "{{ .Name }}-{{ .Version }}"
        with:
          charts_dir: deploy/charts
          skip_existing: "true"
          pages_branch: gh-pages
          packages_with_index: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        if: steps.chart-releaser.outputs.changed_charts != ''
        run: |
          declare -A chart_oci
          chart_oci["mariadb-cluster"]="ghcr.io/${{ github.repository_owner }}/mariadb-cluster-helm"
          chart_oci["mariadb-operator-crds"]="ghcr.io/${{ github.repository_owner }}/mariadb-operator-crds-helm"
          chart_oci["mariadb-operator"]="ghcr.io/${{ github.repository_owner }}/mariadb-operator-helm"

          IFS=',' read -ra charts <<< "${{ steps.chart-releaser.outputs.changed_charts }}"
          for chart_name in "${charts[@]}"; do
            chart_version=$(grep '^version:' "deploy/charts/${chart_name}/Chart.yaml" | awk '{print $2}')
            pkg=".cr-release-packages/${chart_name}-${chart_version}.tgz"

            if [ ! -f "$pkg" ]; then
              echo "Package not found: $pkg, skipping"
              continue
            fi
            if [ -z "${chart_oci[$chart_name]+_}" ]; then
              echo "No OCI mapping for chart '$chart_name', skipping"
              continue
            fi

            echo "Pushing $pkg to ${chart_oci[$chart_name]}"
            helm push "$pkg" "oci://${chart_oci[$chart_name]}"
          done
