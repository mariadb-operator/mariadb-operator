apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  storage:
    # Choose any StorageClass available in your cluster.
    # Local storage (e.g. topolvm) avoids network latency.
    storageClassName: topolvm
    size: 100Gi
    # Grow the volume at runtime: bump size and the operator handles the resize.
    # The StorageClass must have allowVolumeExpansion: true.
    resizeInUseVolumes: true
    waitForVolumeResize: true
