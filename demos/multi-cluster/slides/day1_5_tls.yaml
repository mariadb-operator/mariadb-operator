apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  tls:
    enabled: true
    # Reject any non-TLS connection attempt.
    required: true

    # Option A (default): operator issues and rotates certificates automatically.

    # Option B: delegate issuance to cert-manager.
    serverCertIssuerRef:
      name: root-ca
      kind: ClusterIssuer
    clientCertIssuerRef:
      name: root-ca
      kind: ClusterIssuer

    # Option C: bring your own CA stored in a Secret.
    serverCASecretRef:
      name: mariadb-server-ca
    clientCASecretRef:
      name: mariadb-client-ca
