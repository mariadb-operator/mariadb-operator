apiVersion: v1
kind: Service
metadata:
  name: mdb-emulate-external-test-0-lb
  namespace: default
  annotations:
    metallb.universe.tf/loadBalancerIPs: $CIDR_PREFIX.0.48
spec:
  ports:
  - name: mariadb
    port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app.kubernetes.io/instance: mdb-emulate-external-test
    app.kubernetes.io/name: mariadb
    statefulset.kubernetes.io/pod-name: mdb-emulate-external-test-0  
  type: LoadBalancer