    targetPort: 5555
  - name: agent-probe
    port: 5566
    protocol: TCP
    targetPort: 5566
  selector:
    app.kubernetes.io/instance: mariadb-repl
    app.kubernetes.io/name: mariadb
    statefulset.kubernetes.io/pod-name: mariadb-repl-0
  publishNotReadyAddresses: true
  type: LoadBalancer
