apiVersion: v1
kind: Service
metadata:
  name: mariadb-repl-0-lb
  namespace: default
  annotations:
    metallb.io/loadBalancerIPs: $CIDR_PREFIX.0.110
spec:
  ports:
  - name: mariadb
    port: 3306
    protocol: TCP
    targetPort: 3306
  - name: agent
    port: 5555
