apiVersion: v1
kind: Service
metadata:
  name: maxscale-eu-south-0
  namespace: default
  annotations:
    metallb.io/loadBalancerIPs: $CIDR_PREFIX.1.22
spec:
  ports:
    - name: mariadb
      port: 3306
      protocol: TCP
      targetPort: 3306
    - name: maxscale
      port: 8989
      protocol: TCP
      targetPort: 8989
  selector:
    app.kubernetes.io/instance: maxscale-eu-south
    app.kubernetes.io/name: maxscale
    statefulset.kubernetes.io/pod-name: maxscale-eu-south-0
  type: LoadBalancer
---
