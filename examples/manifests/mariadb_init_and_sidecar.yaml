apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  # Additional init containers to be added to the MariaDB Pod.
  initContainers:
    - name: init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - 'echo "MY_ENV: $MY_ENV"'
      # Isolated containers receive only their explicitly authored env and volume mounts.
      inheritance:
        policy: Isolated
      env:
        - name: MY_ENV
          value: "foo"
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

  # Additional sidecar containers to be added to the MariaDB Pod.
  sidecarContainers:
    - name: sidecar
      image: busybox:1.36
      args:
        - sleep
        - infinity
      # Selected inheritance includes only the named semantic groups.
      inheritance:
        policy: Selected
        env:
          - Runtime
      env:
        - name: INSTANCE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app.kubernetes.io/instance']
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb
              key: password
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

  # Additional volumes to be mounted by containers.
  volumes: 
    - name: tmp
      emptyDir:
        sizeLimit: 100Mi
    - name: mariadb-secret
      secret:
        secretName: mariadb
    - name: mariadb-configmap
      configMap:
        name: mariadb
  # Additional volumeMounts used by MariaDB and Legacy containers. Selected containers may opt into the User group.
  volumeMounts: 
    - name: tmp
      mountPath: /tmp
    - name: mariadb-secret
      mountPath: /mariadb-secret
    - name: mariadb-configmap
      mountPath: /mariadb-configmap

  storage:
    size: 1Gi
