apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  resources:
    requests:
      cpu: "4"
      memory: 8Gi
    limits:
      # Omit CPU limit on dedicated nodes to allow bursting.
      memory: 8Gi

  # innodb_buffer_pool_size should be 70-80% of the memory limit.
  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    innodb_buffer_pool_size=6400M
    max_allowed_packet=1GB
