# Standalone — single node (dev, test)
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  replicas: 1
---
# Galera — multi-master HA, synchronous writes
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  replicas: 3
  galera:
    enabled: true
---
# Replication — semi-sync, automatic primary failover (recommended)
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  replicas: 3
  replication:
    enabled: true
    semiSyncEnabled: true
    primary:
      autoFailover: true
