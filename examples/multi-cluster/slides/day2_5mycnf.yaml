# Label the ConfigMap with k8s.mariadb.com/watch — any edit triggers a rolling update.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-config
  labels:
    k8s.mariadb.com/watch: ""
data:
  my.cnf: |
    [mariadb]
    bind-address=*
    innodb_buffer_pool_size=6400M
    max_allowed_packet=1GB
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  myCnfConfigMapKeyRef:
    name: mariadb-config
    key: my.cnf
