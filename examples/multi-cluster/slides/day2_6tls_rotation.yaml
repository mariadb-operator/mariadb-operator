apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  tls:
    enabled: true
    required: true

    # Option A (default): operator auto-rotates before expiry — zero action needed.

    # Option B: cert-manager renews; operator detects the Secret change and
    # triggers a rolling update automatically.
    serverCertIssuerRef:
      name: root-ca
      kind: ClusterIssuer
    clientCertIssuerRef:
      name: root-ca
      kind: ClusterIssuer

    # Option C: update the CA Secret manually; rolling update is triggered.
    # serverCASecretRef:
    #   name: mariadb-server-ca
    # clientCASecretRef:
    #   name: mariadb-client-ca
