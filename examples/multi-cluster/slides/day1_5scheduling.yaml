apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
spec:
  # Schedule each replica on a different node for true HA.
  affinity:
    antiAffinityEnabled: true

  # Pin Pods to DB-dedicated nodes (high IOPs, high bandwidth).
  nodeSelector:
    node.kubernetes.io/instance-type: m6in.xlarge

  # Tolerate the taint applied to dedicated DB nodes.
  tolerations:
    - key: "mariadb.com/dedicated"
      operator: "Exists"
      effect: "NoSchedule"

  podDisruptionBudget:
    maxUnavailable: "1"

  priorityClassName: system-node-critical
